{% extends 'base.html' %}
{% block content %}

<h2 class="mb-3">My Meetings</h2>

<div class="mb-3 d-flex gap-2">
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#scheduleModal">
    Sign up for a meeting
  </button>
  <a href="#" class="btn btn-secondary">Go to a meeting</a>
</div>

<div class="card">
  <div class="card-body">
    <h5 class="card-title mb-3">Your scheduled meetings</h5>
    <table class="table table-hover align-middle mb-0">
      <thead>
        <tr>
          <th>Title</th>
          <th>Start</th>
          <th>Length</th>
          <th>Zoom</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="4" class="text-muted">No meetings yet.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Schedule Meeting Modal -->
<div class="modal fade" id="scheduleModal" tabindex="-1" aria-labelledby="scheduleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="scheduleModalLabel">Schedule a meeting</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <form id="meetingForm">
          <div class="mb-3">
            <label for="meetingTitle" class="form-label">Title</label>
            <input type="text" class="form-control" id="meetingTitle" placeholder="Check-in">
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="meetingDate" class="form-label">Date</label>
              <input type="date" class="form-control" id="meetingDate">
            </div>
            <div class="col-md-6 mb-3">
              <label for="meetingTime" class="form-label">Time</label>
              <input type="time" class="form-control" id="meetingTime">
            </div>
          </div>

          <div class="mb-3">
            <label for="meetingDuration" class="form-label">Duration (min)</label>
            <input type="number" class="form-control" id="meetingDuration" value="30">
          </div>

          <div class="mb-3">
            <label for="meetingZoom" class="form-label">Zoom link (optional)</label>
            <input type="url" class="form-control" id="meetingZoom" placeholder="https://zoom.us/j/...">
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary" form="meetingForm">Save</button>
      </div>
    </div>
  </div>
</div>

{% endblock %}
